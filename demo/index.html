<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OmniDSP — Constant-Q Transform visualiser</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0d10;
        --fg: #e8e8ea;
        --muted: #9a9aa2;
        --accent: #4ad;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.5 system-ui, -apple-system, sans-serif;
      }
      #app {
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      header h1 { margin: 0 0 2px; font-size: 18px; font-weight: 650; }
      header p { margin: 0 0 16px; color: var(--muted); }
      #stage {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 7;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #222;
      }
      #stage canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #spectrogram { image-rendering: auto; }
      #overlay { pointer-events: none; }
      #stagerow { display: flex; gap: 8px; align-items: stretch; }
      #stage { flex: 1 1 0; min-width: 0; }
      #meter {
        width: 96px;
        align-self: stretch;
        background: #000;
        border: 1px solid #222;
        border-radius: 8px;
      }
      #readout {
        position: fixed;
        pointer-events: none;
        background: rgba(12, 13, 16, 0.94);
        border: 1px solid #313440;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        transform: translate(14px, -50%);
        z-index: 10;
      }
      input[type="range"] {
        accent-color: var(--accent);
        width: 120px;
        vertical-align: middle;
      }
      #legend { vertical-align: middle; }
      #controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
      }
      button {
        background: #1a1c22;
        color: var(--fg);
        border: 1px solid #313440;
        border-radius: 6px;
        padding: 8px 14px;
        font: inherit;
        cursor: pointer;
      }
      button:hover:not(:disabled) { border-color: var(--accent); }
      button:disabled { opacity: 0.45; cursor: default; }
      button[data-active="true"] { border-color: var(--accent); color: var(--accent); }
      label.field {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }
      select {
        background: #1a1c22;
        color: var(--fg);
        border: 1px solid #313440;
        border-radius: 6px;
        padding: 7px 8px;
        font: inherit;
      }
      #stats {
        margin-left: auto;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 12px;
        white-space: nowrap;
      }
      .caption { margin-top: 16px; color: var(--muted); font-size: 13px; }
      .caption strong { color: var(--fg); }
      #error {
        margin-top: 14px;
        color: #ff6b6b;
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>OmniDSP — Constant-Q Transform visualiser</h1>
        <p>Real-time 20&nbsp;Hz–16&nbsp;kHz log-frequency spectrogram, compiled to wasm32.</p>
      </header>

      <div id="stagerow">
        <div id="stage">
          <canvas id="spectrogram"></canvas>
          <canvas id="overlay"></canvas>
        </div>
        <canvas id="meter" title="live spectrum · peak-hold"></canvas>
      </div>
      <div id="readout" hidden></div>

      <div id="controls">
        <button id="start">▶ Start (sample clip)</button>
        <button id="mic" disabled>🎤 Use microphone</button>
        <label class="field" for="minfreq">
          low&nbsp;edge
          <select id="minfreq" title="Lower edge sets the analysis-window length and hence latency">
            <option value="20">20 Hz · ~1.4 s</option>
            <option value="32">32 Hz · ~0.7 s</option>
            <option value="55" selected>55 Hz · ~0.34 s</option>
            <option value="110">110 Hz · ~0.17 s</option>
          </select>
        </label>
        <label class="field" for="span">
          span
          <select id="span" title="On-screen time span; emitted columns are max-pooled to fit">
            <option value="2">2 s</option>
            <option value="8" selected>8 s</option>
            <option value="30">30 s</option>
            <option value="120">120 s</option>
          </select>
        </label>
        <label class="field" for="sens">
          sensitivity
          <input id="sens" type="range" min="30" max="100" step="1" value="70"
            title="right = more sensitive (pulls up fainter detail); left = cleaner" />
          <canvas id="legend" width="150" height="14"></canvas>
        </label>
        <span id="stats" title="process = wasm CQT compute per frame · fps = render rate · col/s = CQT columns emitted per second (the scroll speed)">initialising…</span>
      </div>

      <p class="caption">
        Powered by the <strong>RustBackend floor</strong> — RustFFT/realfft +
        auto-vectorised scalar ops. <strong>No vendor acceleration.</strong>
      </p>
      <div id="error"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
