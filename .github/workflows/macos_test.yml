# .github/workflows/macos_test.yml
# Version to match documentation Example 7 using explicit lock file

name: macOS Sanity Check Explicit Lock Install

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test-accelerate:
    runs-on: macos-latest
    defaults:
      run:
        # Keep bash -el to ensure conda init works for subsequent steps
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Setup Conda using the platform-specific explicit lock file
      - name: Setup Miniconda and Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: omnidsp_env # Name for the environment
          # Use the explicit lock file matching the runner platform
          environment-file: conda-osx-arm64.lock # <-- Use explicit file
          auto-update-conda: true
          auto-activate-base: false

      # Step 2: Run Diagnostics (Should activate omnidsp_env automatically)
      - name: Run Diagnostics
        run: |
          echo "--- Conda Info ---"
          conda info
          echo "--- Conda List ---"
          conda list
          echo "--- Conda Config Sources ---"
          conda config --show-sources
          echo "--- Conda Config Show ---"
          conda config --show
          echo "--- Environment Variables ---"
          printenv | sort