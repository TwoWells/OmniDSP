# .github/workflows/macos_test.yml
name: macOS C++ Tests (Accelerate Backend)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test-accelerate:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Conda Environment Base
        id: setup_conda # Give the step an ID to reference its outputs if needed
        uses: conda-incubator/setup-miniconda@v3
        with:
          # Don't activate here, we'll activate manually in debug/later steps
          auto-activate-base: false
          python-version: 3.12
          # We specify the environment name here for clarity,
          # but creation happens in the debug step
          activate-environment: omnidsp_env # Name from environment.yml
          environment-file: environment.yml

      # Add Debug Step Here
      - name: Debug Conda Environment Creation
        shell: bash -el {0}
        run: |
          echo "--- Conda Info ---"
          conda info
          echo "--- Environment File Content ---"
          cat environment.yml
          echo "--- Attempting Environment Creation with Verbosity ---"
          # Activate the intended environment name's path (might not exist yet)
          # Or just ensure conda command is available from base
          # Use --verbose flag (or -vv) for more detailed output
          conda env create -f environment.yml --name omnidsp_env --verbose
          echo "--- Listing Packages after creation attempt (if successful) ---"
          conda list -n omnidsp_env || echo "Environment creation likely failed."
          echo "--- Debug Step Complete ---"

      # Configure CMake - Ensure Accelerate is preferred and tests are enabled
      - name: Configure CMake
        shell: bash -el {0}
        run: |
          # Ensure the environment is activated for this step
          conda activate omnidsp_env
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
                -D PREFER_ACCELERATE=ON \
                -D PREFER_ONEMKL=OFF \
                -D OMNIDSP_BUILD_TESTS=ON

      # Build the C++ code
      - name: Build
        shell: bash -el {0}
        run: |
          # Ensure the environment is activated for this step
          conda activate omnidsp_env
          cmake --build build --config Release

      # Run C++ Tests using CTest
      - name: Test
        shell: bash -el {0}
        working-directory: ./build
        run: |
          # Ensure the environment is activated for this step
          conda activate omnidsp_env
          ctest --output-on-failure -C Release