# .github/workflows/macos_test.yml
# Runs C++ tests on macOS using the Accelerate backend.
# Uses explicit lock file via setup-miniconda.
# Skips execution if only documentation or specific config files are changed.

name: macOS C++ Tests (Accelerate Backend)

on:
  push:
    branches: [main, master]
    # Ignore pushes that only change documentation or specific non-code files
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".gitattributes"
      - "docs/**"
      - "notebooks/**"
      # Add other non-code paths to ignore if needed

  pull_request:
    branches: [main, master]
    # Ignore pull requests that only change documentation or specific non-code files
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".gitattributes"
      - "docs/**"
      - "notebooks/**"
      # Add other non-code paths to ignore if needed

  workflow_dispatch: # Allows manual triggering

jobs:
  build-and-test-accelerate:
    runs-on: macos-latest
    defaults:
      run:
        # Use bash -el to ensure conda init works correctly
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Setup Conda using the platform-specific explicit lock file
      - name: Setup Miniconda and Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: omnidsp # UPDATED environment name
          # Use the explicit lock file matching the runner platform
          # Assuming macos-latest uses arm64
          environment-file: conda-osx-arm64.lock
          auto-update-conda: true
          auto-activate-base: false

      # Step 2: Configure CMake
      # Rely on CMAKE_PREFIX_PATH set by activated conda env
      - name: Configure CMake
        run: |
          echo "Using CONDA_PREFIX=$CONDA_PREFIX"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
                -D PREFER_ACCELERATE=ON \
                -D PREFER_ONEMKL=OFF \
                -D OMNIDSP_BUILD_TESTS=ON

      # Step 3: Build the C++ code
      - name: Build
        run: |
          cmake --build build --config Release

      # Step 4: Run C++ Tests using CTest
      - name: Test
        working-directory: ./build
        run: |
          ctest --output-on-failure -C Release
