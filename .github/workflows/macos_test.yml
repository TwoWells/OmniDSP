# .github/workflows/macos_test.yml
name: macOS Sanity Check Conda Lock Install (Explicit Create)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test-accelerate:
    runs-on: macos-latest
    defaults:
      run:
        # Keep bash -el to ensure conda init works for subsequent steps
        shell: bash -el {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Setup base Conda only
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true # Keep conda updated
          auto-activate-base: false # Don't activate base
          # Remove environment activation/file inputs that trigger 'conda env update'
          # activate-environment: omnidsp_env
          # environment-file: conda-lock.yml

      # Step 2: Explicitly create environment from the unified lock file
      - name: Create environment from lock file
        run: |
          echo "Attempting to create environment from conda-lock.yml"
          conda create --name omnidsp_env --file conda-lock.yml
          echo "Environment creation command finished."
          # Optional: Add command to check if env exists
          conda info --envs

      # Step 3: Activate and run diagnostics
      - name: Run Diagnostics
        run: |
          echo "Activating omnidsp_env..."
          conda activate omnidsp_env
          echo "--- Conda Info ---"
          conda info
          echo "--- Conda List ---"
          conda list
          echo "--- Conda Config Sources ---"
          conda config --show-sources
          echo "--- Conda Config Show ---"
          conda config --show
          echo "--- Environment Variables ---"
          printenv | sort