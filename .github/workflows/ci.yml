# CI — lint, build, and test OmniDSP on every push.
#
# Split by toolchain need:
#   check         the pure-Rust floor — runs on GitHub-hosted `ubuntu-latest`,
#                 free + fork-safe on this public repo. The toolchain travels
#                 with the job via the public `ghcr.io/twowells/rust-ci` image
#                 (same pattern as Lattice), so hosted needs no provisioning;
#                 `ubuntu-latest` supports container jobs.
#   vendor-intel  the Intel oneMKL + IPP backends — stay on the self-hosted ARC
#                 pool (org var `CI_RUNNER_LINUX`) in the INTERNAL
#                 `ghcr.io/twowells/omnidsp-ci` image (rust-ci + Intel oneMKL +
#                 IPP devel). That image bundles Intel libraries and CANNOT be
#                 published publicly, so this job cannot move to a hosted runner.
#
# There is intentionally NO `pull_request` trigger. A fork PR fires only a
# pull_request event, so push/workflow_dispatch-only triggers keep a fork PR
# from ever scheduling onto the self-hosted `vendor-intel` job (the floor
# `check` is hosted and would be fork-safe on its own, but the guard still
# protects the Intel pool). For outside-contributor floor CI, add a SEPARATE
# `on: pull_request` workflow pinned to `runs-on: ubuntu-latest`.
#
# Apple Accelerate builds on a macOS runner and lands as its own job when that
# crate exists.
name: CI

on:
  push:
  workflow_dispatch:

# A new push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # GitHub-hosted runner. The toolchain travels with the job via this public
    # image (rustup + pinned toolchain + cc/make/git), so hosted needs no
    # provisioning; `ubuntu-latest` supports container jobs.
    container: ghcr.io/twowells/rust-ci:latest
    # Inside a container job GitHub's default shell is sh (dash); force bash so
    # run steps don't silently break on a bashism.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      # rustup reads rust-toolchain.toml (the pinned channel + rustfmt/clippy)
      # and installs the toolchain if the runner doesn't have it yet.
      - name: Materialize pinned Rust toolchain
        run: |
          rustup show
          rustc --version && cargo --version

      # Caches the registry, git deps, and target dir keyed on Cargo.lock so the
      # ephemeral pods don't rebuild the world every push (cache lives GitHub-side).
      - uses: Swatinem/rust-cache@v2

      # Prebuilt binaries — far faster than `cargo install` from source on an
      # ephemeral runner with no warm cache. These are the three tools `make
      # check` invokes (cargo-mutants is only for `make mutants`).
      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-deny,cargo-machete

      # The project's single source of truth for "passing": fmt, clippy
      # (-D warnings, incl. the bench-feature lint pass), deny, machete, cargo
      # doc, and the nextest suite over f32 + f64. See the Makefile.
      - name: make check
        run: make check

  # Intel oneMKL vendor backend. The floor `check` job above cannot link MKL, so
  # the oneMKL crates are workspace-excluded and gated HERE instead: on the
  # self-hosted ARC pool, in the `omnidsp-ci` image that bakes in oneMKL + IPP
  # devel (MKLROOT / IPPROOT / MKL_THREADING_LAYER=SEQUENTIAL / LD_LIBRARY_PATH
  # all preset). `make onemkl-check` builds, lints, and holds OneMklBackend to
  # the shared conformance golden vectors — the same suite the floor passes — so
  # the vendor cannot silently drift. This is the CI-driven validation loop:
  # these crates cannot be built on a dev box without Intel oneMKL installed.
  vendor-intel:
    runs-on: ${{ vars.CI_RUNNER_LINUX }}
    container: ghcr.io/twowells/omnidsp-ci:latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Materialize pinned Rust toolchain
        run: |
          rustup show
          rustc --version && cargo --version

      # Confirm the image's MKL is link-ready before the heavier build (fast fail
      # with a clear message if the env regressed).
      - name: Verify oneMKL environment
        run: |
          echo "MKLROOT=$MKLROOT"
          test -n "$MKLROOT" || { echo "MKLROOT unset — wrong image?"; exit 1; }
          ls "$MKLROOT/lib/intel64/libmkl_rt.so" 2>/dev/null \
            || ls "$MKLROOT/lib/libmkl_rt.so" 2>/dev/null \
            || { echo "libmkl_rt.so not found under MKLROOT"; exit 1; }

      # Confirm the image's IPP is link-ready (same image bundles ipps + oneMKL).
      - name: Verify IPP environment
        run: |
          echo "IPPROOT=$IPPROOT"
          test -n "$IPPROOT" || { echo "IPPROOT unset — wrong image?"; exit 1; }
          ls "$IPPROOT/lib/intel64/libipps.so" 2>/dev/null \
            || ls "$IPPROOT/lib/libipps.so" 2>/dev/null \
            || { echo "libipps.so not found under IPPROOT"; exit 1; }

      - uses: Swatinem/rust-cache@v2
        with:
          # The excluded vendor crates carry their own Cargo.lock; key the cache
          # on them so the floor cache and this one don't thrash each other.
          workspaces: |
            omnidsp-onemkl-sys
            omnidsp-onemkl
            omnidsp-ipp-sys
            omnidsp-ipp

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Build + lint + conformance-test the oneMKL vendor crates by manifest path
      # (they are workspace-excluded). Links libmkl_rt from the image.
      - name: make onemkl-check
        run: make onemkl-check

      # Build + lint the IPP vendor crates by manifest path (workspace-excluded).
      # Links ipps/ippvm/ippcore from the image; the `-sys` smoke test calls
      # ippsGetLibVersion so a green run proves the link resolves, and the
      # `omnidsp-ipp` wrapper is held to the shared golden-vector conformance suite
      # (f32 + f64) — the same vectors the floor passes, so the vendor cannot
      # silently drift.
      - name: make ipp-check
        run: make ipp-check

      # The `omnidsp` integration: the `onemkl` feature wires OneMklBackend as the
      # Best/Auto alias plus the `OmniDSP::onemkl()` constructor. The floor `check`
      # job lints and tests `omnidsp` with the feature OFF, so this cfg-gated
      # vendor path is only exercised here.
      - name: omnidsp --features onemkl
        run: |
          cargo clippy -p omnidsp --features onemkl --all-targets -- -D warnings
          cargo nextest run -p omnidsp --features onemkl --no-fail-fast --no-tests=pass

      # The `omnidsp` integration for IPP: the `ipp` feature wires IppBackend as
      # the Best/Auto alias plus the `OmniDSP::ipp()` constructor (IPP outranks
      # oneMKL when both are on). Same as the onemkl step — the floor `check` job
      # runs the feature OFF, so this cfg-gated vendor path is only exercised here.
      - name: omnidsp --features ipp
        run: |
          cargo clippy -p omnidsp --features ipp --all-targets -- -D warnings
          cargo nextest run -p omnidsp --features ipp --no-fail-fast --no-tests=pass
