# CI — lint, build, and test OmniDSP on every push.
#
# Runs on the self-hosted ARC pool `homeserver-pool` (ephemeral Linux pods,
# minRunners: 0 — a fresh container is spun up per job and torn down after).
# Mirrors the Lattice `rust-ci` pattern: the toolchain travels with the job via
# the `ghcr.io/twowells/rust-ci` image rather than being baked into the runner.
#
# There is intentionally NO `pull_request` trigger. Fork PRs fire only
# pull_request events (their push happened in the fork), so with
# push/workflow_dispatch-only triggers a fork PR can never schedule a job onto
# the self-hosted runners. For outside-contributor PR CI, add a SEPARATE
# workflow with `on: pull_request` pinned to `runs-on: ubuntu-latest`
# (GitHub-hosted, free on public repos, fork-safe).
#
# The Intel vendor backends (oneMKL today, IPP later) build on this same pool
# but in the `ghcr.io/twowells/omnidsp-ci` image (rust-ci + oneMKL + IPP devel) —
# see the `vendor-intel` job below. Apple Accelerate builds on the macOS runner
# and lands as its own job when that crate exists.
name: CI

on:
  push:
  workflow_dispatch:

# A new push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: homeserver-pool
    # The ARC pod is a bare runner with no Rust. This image bakes in rustup + the
    # pinned toolchain + cc/make/git, so the job doesn't reprovision every run.
    container: ghcr.io/twowells/rust-ci:latest
    # Inside a container job GitHub's default shell is sh (dash); force bash so
    # run steps don't silently break on a bashism.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      # rustup reads rust-toolchain.toml (the pinned channel + rustfmt/clippy)
      # and installs the toolchain if the runner doesn't have it yet.
      - name: Materialize pinned Rust toolchain
        run: |
          rustup show
          rustc --version && cargo --version

      # Caches the registry, git deps, and target dir keyed on Cargo.lock so the
      # ephemeral pods don't rebuild the world every push (cache lives GitHub-side).
      - uses: Swatinem/rust-cache@v2

      # Prebuilt binaries — far faster than `cargo install` from source on an
      # ephemeral runner with no warm cache. These are the three tools `make
      # check` invokes (cargo-mutants is only for `make mutants`).
      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-deny,cargo-machete

      # The project's single source of truth for "passing": fmt, clippy
      # (-D warnings, incl. the bench-feature lint pass), deny, machete, cargo
      # doc, and the nextest suite over f32 + f64. See the Makefile.
      - name: make check
        run: make check

  # Intel oneMKL vendor backend. The floor `check` job above cannot link MKL, so
  # the oneMKL crates are workspace-excluded and gated HERE instead: same
  # self-hosted pool, but in the `omnidsp-ci` image that bakes in oneMKL + IPP
  # devel (MKLROOT / IPPROOT / MKL_THREADING_LAYER=SEQUENTIAL / LD_LIBRARY_PATH
  # all preset). `make onemkl-check` builds, lints, and holds OneMklBackend to
  # the shared conformance golden vectors — the same suite the floor passes — so
  # the vendor cannot silently drift. This is the CI-driven validation loop:
  # these crates cannot be built on a dev box without Intel oneMKL installed.
  vendor-intel:
    runs-on: homeserver-pool
    container: ghcr.io/twowells/omnidsp-ci:latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Materialize pinned Rust toolchain
        run: |
          rustup show
          rustc --version && cargo --version

      # Confirm the image's MKL is link-ready before the heavier build (fast fail
      # with a clear message if the env regressed).
      - name: Verify oneMKL environment
        run: |
          echo "MKLROOT=$MKLROOT"
          test -n "$MKLROOT" || { echo "MKLROOT unset — wrong image?"; exit 1; }
          ls "$MKLROOT/lib/intel64/libmkl_rt.so" 2>/dev/null \
            || ls "$MKLROOT/lib/libmkl_rt.so" 2>/dev/null \
            || { echo "libmkl_rt.so not found under MKLROOT"; exit 1; }

      - uses: Swatinem/rust-cache@v2
        with:
          # The excluded vendor crates carry their own Cargo.lock; key the cache
          # on them so the floor cache and this one don't thrash each other.
          workspaces: |
            omnidsp-onemkl-sys
            omnidsp-onemkl

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Build + lint + conformance-test the oneMKL vendor crates by manifest path
      # (they are workspace-excluded). Links libmkl_rt from the image.
      - name: make onemkl-check
        run: make onemkl-check
