# Conda environment configuration for OmniDSP project
# Uses preprocessing selectors to conditionally include MKL dependencies
# Specifies target platforms for conda-lock

# Environment name
name: omnidsp_env

# Channels to search for packages, order matters
# Keep all channels listed for all platforms
channels:
  - https://software.repos.intel.com/python/conda
  - conda-forge
  - defaults

# Target platforms for conda-lock
platforms:
  - osx-arm64
  - linux-64
  - win-64

# List of dependencies
dependencies:
  # --------------------------------------------------------------------
  # Core Python & Package Management
  # --------------------------------------------------------------------
  - python>=3.8
  - pip

  # --------------------------------------------------------------------
  # C++ Build Toolchain & Dependencies (Managed by Conda)
  # --------------------------------------------------------------------
  - cmake>=3.21
  - cxx-compiler
  - make # Or ninja
  - gtest

  # --------------------------------------------------------------------
  # Optimized DSP Backends (Selected by CMake based on availability)
  # --------------------------------------------------------------------
  # MKL dependencies (Only install on Linux or Windows)
  - intel-openmp # [linux]
  - mkl-devel    # [linux]
  - ipp-devel    # [linux]
  - intel-openmp # [win]
  - mkl-devel    # [win]
  - ipp-devel    # [win]

  # Accelerate framework (For macOS) is provided by the OS, not Conda.

  # --------------------------------------------------------------------
  # Python Package Build & Runtime Dependencies
  # --------------------------------------------------------------------
  - numpy
  - scipy
  - pybind11
  - scikit-build-core>=0.7

  # --------------------------------------------------------------------
  # Python Testing
  # --------------------------------------------------------------------
  - pytest

  # --------------------------------------------------------------------
  # Dependencies for Notebooks/Examples (Optional)
  # --------------------------------------------------------------------
  - jupyterlab # Or 'notebook'
  - librosa
  - resampy
  - matplotlib

# --------------------------------------------------------------------
# Pip dependencies
# --------------------------------------------------------------------
# - pip:
#   - some-pip-only-package