# Conda environment configuration for OmniDSP project

# Environment name
name: omnidsp_env

# Channels to search for packages, order matters
channels:
  - conda-forge    # Primary channel for many C/C++ libraries and build tools
  - https://software.repos.intel.com/python/conda # For Intel MKL
  - defaults       # Default Anaconda channel

# List of dependencies
dependencies:
  # --------------------------------------------------------------------
  # Core Python & Package Management
  # --------------------------------------------------------------------
  - python>=3.8     # Base Python version requirement
  - pip             # For installing packages not available via Conda (if needed)

  # --------------------------------------------------------------------
  # C++ Build Toolchain & Dependencies (Managed by Conda)
  # --------------------------------------------------------------------
  - cmake>=3.21     # Build system generator
  - cxx-compiler    # Provides platform-specific C++ compiler (e.g., g++, clang++, msvc)
  - make            # Build tool (alternative: ninja)
  - gtest           # GoogleTest framework for C++ unit tests

  # --------------------------------------------------------------------
  # Optimized DSP Backends (Selected by CMake based on availability)
  # --------------------------------------------------------------------
  # MKL (For x86 Linux/Windows/macOS - if preferred/available)
  - intel-openmp    # Required runtime for MKL OpenMP threading
  - mkl             # Intel Math Kernel Library runtime
  - mkl-devel       # MKL development headers and libraries for linking

  # Accelerate framework (For macOS) is provided by the OS, not Conda.

  # --------------------------------------------------------------------
  # Python Package Build & Runtime Dependencies
  # --------------------------------------------------------------------
  - numpy           # Fundamental package for numerical computation
  - scipy           # For signal processing (convolution/correlation) in reference generation script [cite: OmniDSP/environment.yml]
  - pybind11        # For creating Python bindings for C++ code
  - scikit-build-core>=0.7 # Build backend for CMake-based Python extensions

  # --------------------------------------------------------------------
  # Python Testing
  # --------------------------------------------------------------------
  - pytest          # Framework for Python unit tests

  # --------------------------------------------------------------------
  # Dependencies for Notebooks/Examples (Optional)
  # --------------------------------------------------------------------
  - jupyterlab      # Interactive development environment (or 'notebook')
  - librosa         # Python library for audio and music analysis (for comparison)
  - matplotlib      # For plotting in examples

# --------------------------------------------------------------------
# Pip dependencies (if any package is only available via pip)
# --------------------------------------------------------------------
# - pip:
#   - some-pip-only-package